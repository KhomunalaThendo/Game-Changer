<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechLynk AI Trading - Checkout</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background: #050816;
      font-family: Arial, sans-serif;
    }

    .glass{
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .glow{
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }

    .gradient-text{
      background: linear-gradient(to right,#60a5fa,#a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    input{
      outline: none;
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <!-- NAVBAR -->
  <nav class="w-full px-8 py-5 flex justify-between items-center border-b border-gray-800">
    <h1 class="text-2xl font-bold gradient-text">
      TechLynk AI Trading
    </h1>

    <div class="hidden md:flex gap-8 text-sm">
      <a href="#" class="hover:text-blue-400 transition">Home</a>
      <a href="#" class="hover:text-blue-400 transition">Robots</a>
      <a href="#" class="hover:text-blue-400 transition">Performance</a>
      <a href="#" class="hover:text-blue-400 transition">Support</a>
    </div>
  </nav>

  <!-- CHECKOUT SECTION -->
  <section class="max-w-7xl mx-auto px-6 py-12">

    <div class="grid lg:grid-cols-3 gap-10">

      <!-- LEFT SIDE -->
      <div class="lg:col-span-2">

        <div class="glass rounded-3xl p-8">

          <h2 class="text-3xl font-bold mb-8">
            Checkout
          </h2>

          <!-- CUSTOMER INFO -->
          <div class="mb-10">

            <h3 class="text-xl font-semibold mb-5 text-blue-400">
              Customer Information
            </h3>

            <div class="grid md:grid-cols-2 gap-5">

              <input
                type="text"
                placeholder="First Name"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
              />

              <input
                type="text"
                placeholder="Last Name"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
              />

              <input
                type="email"
                placeholder="Email Address"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4 md:col-span-2"
              />

              <input
                type="text"
                placeholder="Phone Number"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4 md:col-span-2"
              />

            </div>
          </div>

          <!-- PAYMENT -->
          <div>

            <h3 class="text-xl font-semibold mb-5 text-purple-400">
              Payment Details
            </h3>

            <div class="grid gap-5">

              <input
                type="text"
                placeholder="Card Holder Name"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
              />

              <input
                type="text"
                placeholder="Card Number"
                class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
              />

              <div class="grid grid-cols-2 gap-5">

                <input
                  type="text"
                  placeholder="MM/YY"
                  class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
                />

                <input
                  type="text"
                  placeholder="CVV"
                  class="bg-[#0f172a] border border-gray-700 rounded-xl p-4"
                />

              </div>

            </div>
          </div>

        </div>

      </div>

      <!-- ORDER SUMMARY -->
      <div>

        <div class="glass rounded-3xl p-8 sticky top-10 glow">

          <h2 class="text-2xl font-bold mb-8">
            Order Summary
          </h2>

          <!-- PRODUCT -->
          <div class="flex items-center gap-4 mb-6">

            <img
              src="https://images.unsplash.com/photo-1642104704074-907c0698cbd9?q=80&w=400"
              class="w-20 h-20 rounded-2xl object-cover"
            />

            <div>
              <h3 class="font-semibold">
                NASDAQ Sniper AI
              </h3>

              <p class="text-gray-400 text-sm">
                MT5 Trading Robot
              </p>
            </div>

          </div>

          <!-- DETAILS -->
          <div class="space-y-4 border-y border-gray-700 py-6">

            <div class="flex justify-between">
              <span class="text-gray-400">Price</span>
              <span>$199</span>
            </div>

            <div class="flex justify-between">
              <span class="text-gray-400">License</span>
              <span>Lifetime</span>
            </div>

            <div class="flex justify-between">
              <span class="text-gray-400">Discount</span>
              <span class="text-green-400">-10%</span>
            </div>

          </div>

          <!-- TOTAL -->
          <div class="flex justify-between items-center py-6">

            <span class="text-xl font-semibold">
              Total
            </span>

            <span class="text-3xl font-bold text-blue-400">
              $179
            </span>

          </div>

          <!-- BUTTON -->
          <button
            class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:scale-105 transition duration-300 rounded-2xl py-4 font-semibold text-lg"
          >
            Complete Purchase
          </button>

          <!-- SECURITY -->
          <div class="mt-6 text-center text-gray-400 text-sm">
            🔒 Secure SSL Encrypted Payment
          </div>

        </div>

      </div>

    </div>

  </section>

</body>
</html>
