<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050816] text-white">

<section class="p-10">

  <h1 class="text-3xl font-bold">Checkout</h1>

  <div id="summary" class="mt-6"></div>

  <h2 class="text-2xl mt-6">
    Total: <span id="total"></span>
  </h2>

  <button onclick="placeOrder()"
    class="bg-green-500 px-6 py-3 rounded-xl mt-6">

    Pay Now

  </button>

</section>

<script src="app.js"></script>

<script>
let total = 0;

function load(){

  const summary = document.getElementById("summary");

  cart.forEach(i => {

    total += i.price * i.quantity;

    summary.innerHTML += `
      <p>${i.name} - ${i.quantity}x</p>
    `;
  });

  document.getElementById("total").innerText = "$" + total;
}

async function placeOrder(){

  const res = await fetch("http://localhost:3000/api/orders", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      customer: { name: "Demo User", email: "test@email.com" },
      cart,
      total
    })
  });

  const data = await res.json();

  alert("Order Successful ID: " + data.orderId);

  localStorage.removeItem("cart");

  window.location.href = "index.html";
}

load();
</script>

</body>
</html>
