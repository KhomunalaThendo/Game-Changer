<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050816] text-white">

<nav class="flex justify-between p-5 border-b border-gray-800">
  <a href="index.html">Home</a>

  <a href="cart.html" class="relative">
    🛒
    <span id="cartCount"
      class="absolute -top-3 -right-3 bg-blue-500 px-2 text-xs rounded-full">
      0
    </span>
  </a>
</nav>

<section class="grid md:grid-cols-2 gap-10 p-10">

  <img id="mainImg"
    src="/src/game changer.png"
    class="rounded-2xl"/>

  <div>

    <h1 class="text-4xl font-bold">Game Changer AI</h1>

    <p class="text-gray-400 mt-2">
      High-performance MT5 trading robot
    </p>

    <select id="license"
      class="bg-gray-800 p-3 mt-6 rounded-xl w-full">

      <option value="1 000">Mobile - R1 000</option>
      <option value="2 000">PC - R2 000</option>

    </select>

    <button id="addBtn"
      class="bg-blue-500 w-full mt-6 py-3 rounded-xl">

      Add To Cart

    </button>

  </div>

</section>

<script src="app.js"></script>

<script>
document.getElementById("addBtn").onclick = () => {

  const product = {
    name: "Game Changer AI",
    price: parseInt(document.getElementById("license").value),
    quantity: 1,
    license: document.getElementById("license").selectedOptions[0].text,
    image: document.getElementById("mainImg").src
  };

  addToCart(product);

  console.log("Added to cart!");
};
</script>

</body>
</html>
